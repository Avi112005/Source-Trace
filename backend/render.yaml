services:
  - type: web
    name: source-trace-backend
    env: python
    region: oregon
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATA_DIR
        value: /data
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
    disk:
      name: persistent-storage
      mountPath: /data
      sizeGB: 1
